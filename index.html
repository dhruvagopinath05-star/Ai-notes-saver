<!DOCTYPE html>
<html>

<head>
    <title>NotebookAI</title>
    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

    <div class="navbar">

        <div class="logo">NotebookAI</div>

        <div class="nav-buttons">
            <button id="loginBtn" class="login-btn">Login with Google</button>
        </div>

    </div>

    <div class="layout">

        <div class="sidebar">

            <h3>Your Space</h3>

            <button class="create-btn">+ New Note</button>

            <p class="hint">Your notes will appear here</p>

        </div>

        <div class="main">

            <div class="editor-card">

                <h2>Create a Note</h2>

                <textarea id="noteInput" placeholder="Write something amazing..."></textarea>

                <button id="saveNote" class="save-btn">Save Note</button>

            </div>

            <div class="notes-area">

                <h2>Saved Notes</h2>

                <div id="notes"></div>

            </div>

        </div>

    </div>

    <script type="module" src="app.js"></script>
    <script src="script.js"></script>

</body>

</html>
